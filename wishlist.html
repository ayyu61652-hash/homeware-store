<!-- SCRIPT WISHLIST -->
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
    let container = document.getElementById("wishlist-items");

    if (wishlist.length === 0) {
        container.innerHTML = `
            <div class="col-span-4 text-center">
                <h2 class="text-2xl text-gray-500">
                    ❤️ Wishlist masih kosong
                </h2>
            </div>
        `;
        return;
    }

    container.innerHTML = "";

    wishlist.forEach(id => {

        let product = window.products.find(item => item.id === Number(id));

        if (!product) return;

        container.innerHTML += `
        <div class="bg-white rounded-2xl shadow-lg p-4">

            <img src="${product.image}"
                 class="w-full h-60 object-cover rounded-xl">

            <h2 class="font-bold text-lg mt-3">
                ${product.name}
            </h2>

            <p class="text-pink-500 font-bold mb-4">
                Rp ${product.price.toLocaleString('id-ID')}
            </p>

            <button onclick="addToCart(${product.id})"
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-lg mb-2">
                🛒 Tambah ke Keranjang
            </button>

            <button onclick="removeWishlist(${product.id})"
                    class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg">
                🗑️ Hapus Wishlist
            </button>

        </div>
        `;
    });
});

function removeWishlist(id) {
    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cart-count").innerText = cart.length;
    wishlist = wishlist.filter(item => item != id);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    location.reload();
}
function addToCart(id) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let product = window.products.find(item => item.id === Number(id));

    let existing = cart.find(item => item.id === Number(id));

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.image,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(product.name + " berhasil ditambahkan ke keranjang 🛒");
}
</script>
