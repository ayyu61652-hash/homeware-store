<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja | HomeWare Store</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-pink-50">

<header class="bg-pink-400 text-white shadow-lg">

    <div class="max-w-6xl mx-auto flex justify-between items-center p-6">

        <h1 class="text-3xl font-bold">
            🛒 Keranjang Belanja
        </h1>

        <a href="index.html"
        class="bg-white text-pink-500 px-5 py-2 rounded-full font-semibold">
            ← Kembali Belanja
        </a>

    </div>

</header>

<div class="max-w-5xl mx-auto mt-10">

    <div class="bg-white rounded-3xl shadow-lg p-6">

        <!-- Produk akan muncul di sini -->
        <div id="cart-items"></div>

        <!-- Total -->
        <div class="flex justify-between mt-8 border-t pt-6">

            <h2 class="text-2xl font-bold">
                Total Belanja
            </h2>

            <h2 id="total-price" class="text-2xl font-bold text-pink-500">
                Rp0
            </h2>

        </div>

    </div>

    <button onclick="goToCheckout()"
        class="w-full mt-8 bg-pink-400 hover:bg-pink-500 text-white py-4 rounded-full text-xl font-bold">

        Lanjut ke Checkout →

    </button>

</div>

<!-- Hubungkan ke script.js -->
<script src="js/script.js"></script>

<script>
function goToCheckout(){
    window.location.href = "checkout.html";
}
</script>

</body>
</html>
